<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 DormChef - Recipe Generator</title>
    <script>
        console.log('🚀 HTML parsing started - Emergency Logger Active');
        window.onerror = function(msg, url, line) { 
            console.error('JS Error: ' + msg + ' at ' + url + ':' + line);
            alert('❌ JS Error: ' + msg + ' at ' + url + ':' + line);
            return true;
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* EMERGENCY FALLBACK - IF CDN FAILS */
        .hidden { display: none !important; }
        #appliancesContainer { display: block !important; min-height: 100px; border: 2px solid red; padding: 10px; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        header { background: linear-gradient(to right, #f97316, #eab308); color: white; padding: 1rem; }
        main { max-width: 56rem; margin: 0 auto; padding: 1rem; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.75rem; }
        button { background: #f97316; color: white; padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; }
        button:hover { opacity: 0.9; }
        input, select { padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.25rem; }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --accent: #f97316;
            --input-bg: #ffffff;
            --input-text: #1f2937;
            --input-border: #d1d5db;
        }

        body.dark-mode {
            --bg-primary: #1f2937;
            --bg-secondary: #111827;
            --text-primary: #f3f4f6;
            --text-secondary: #d1d5db;
            --border-color: #374151;
            --accent: #fb923c;
            --input-bg: #374151;
            --input-text: #f3f4f6;
            --input-border: #4b5563;
        }

        body {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .card {
            background-color: var(--bg-primary);
            border-color: var(--border-color);
            transition: background-color 0.3s;
        }

        input, select, textarea {
            background-color: var(--input-bg) !important;
            color: var(--input-text) !important;
            border-color: var(--input-border) !important;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .tab-btn {
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
            color: var(--text-primary);
        }

        .tab-btn.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .text-muted {
            color: var(--text-secondary);
        }

        .error-text {
            color: #dc2626;
        }

        .dark-mode .error-text {
            color: #fca5a5;
        }
</head>
<body style="display: block !important; opacity: 1 !important; background: white !important;">
    <!-- Header -->
    <header class="bg-gradient-to-r from-orange-500 to-yellow-500 text-white p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold">🍳 DormChef</h1>
            <div class="flex gap-2">
                <button id="themeBtn" class="text-2xl hover:scale-110 transition" title="Toggle theme">🌙</button>
                <button id="langBtn" class="px-3 py-1 bg-white text-orange-500 rounded font-bold" title="Toggle language">EN</button>
            </div>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="max-w-4xl mx-auto mt-6 flex gap-4 border-b px-6" style="border-color: var(--border-color);">
        <button class="tab-btn active px-4 py-2 text-lg font-semibold" data-tab="generator" data-i18n-key="tabGenerate">🍳 Generate</button>
        <button class="tab-btn px-4 py-2 text-lg font-semibold" data-tab="history" data-i18n-key="tabHistory">📋 History</button>
        <button class="tab-btn px-4 py-2 text-lg font-semibold" data-tab="appliances" data-i18n-key="tabAppliances">⚙️ Appliances</button>
    </div>

    <main class="max-w-4xl mx-auto p-6">
        <!-- TAB: Generator -->
        <section id="tab-generator" class="tab-content">
            <div class="card border rounded-lg p-6 shadow">
                <h2 class="text-2xl font-bold mb-4" data-i18n-key="generate_title">Generate Recipe</h2>

                <!-- Ingredients Input -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2" data-i18n-key="ingredients">Ingredients:</label>
                    <input type="text" id="ingredientsInput" placeholder="e.g., eggs, bread, butter" class="w-full px-4 py-2 border rounded card" />
                    <small class="text-muted" data-i18n-key="ingredients_hint">Separate with commas</small>
                </div>

                <!-- Appliances Checkboxes -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-3" data-i18n-key="appliances">Appliances:</label>
                    <div id="appliancesContainer" class="grid grid-cols-2 gap-3 mb-4">
                        <p class="text-muted">Loading appliances...</p>
                    </div>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" class="btn-primary px-6 py-3 rounded font-bold w-full">
                    <span data-i18n-key="generate_btn">Generate Recipe</span>
                </button>

                <!-- Loading State -->
                <div id="loadingSpinner" class="hidden mt-4 text-center">
                    <span class="loading">⏳</span> <span data-i18n-key="generating">Generating...</span>
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="hidden mt-4 p-3 rounded" style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444;">
                    <p id="errorText" class="error-text"></p>
                </div>

                <!-- Recipe Display -->
                <div id="recipeResult" class="hidden mt-6 p-4 border rounded card">
                    <h3 id="recipeTitle" class="text-2xl font-bold mb-2"></h3>
                    <p id="recipeDesc" class="text-sm mb-3 text-muted"></p>
                    <div class="flex gap-4 text-sm mb-4 flex-wrap">
                        <span><strong data-i18n-key="time">Time:</strong> <span id="recipeTime"></span> min</span>
                        <span><strong data-i18n-key="difficulty">Difficulty:</strong> <span id="recipeDifficulty"></span></span>
                        <span><strong data-i18n-key="servings">Servings:</strong> <span id="recipeServings"></span></span>
                    </div>

                    <!-- Recipe Steps -->
                    <h4 class="font-semibold mb-2" data-i18n-key="steps">Steps:</h4>
                    <div id="recipeSteps" class="space-y-2 mb-4"></div>

                    <!-- Notes -->
                    <p id="recipeNotes" class="text-sm italic text-muted"></p>
                </div>
            </div>
        </section>

        <!-- TAB: History -->
        <section id="tab-history" class="tab-content hidden">
            <div class="card border rounded-lg p-6 shadow">
                <h2 class="text-2xl font-bold mb-4" data-i18n-key="history_title">Recipe History</h2>
                <div id="historyContainer" class="space-y-3">
                    <p class="text-muted">No recipes yet. Generate one!</p>
                </div>
            </div>
        </section>

        <!-- TAB: Appliances -->
        <section id="tab-appliances" class="tab-content hidden">
            <div class="card border rounded-lg p-6 shadow">
                <h2 class="text-2xl font-bold mb-4" data-i18n-key="available_appliances">Available Appliances</h2>
                
                <!-- Add Custom Appliance Form -->
                <div class="card border rounded p-4 mb-6 bg-gray-50" style="background-color: var(--bg-secondary);">
                    <h3 class="font-bold mb-3">➕ Add Custom Appliance</h3>
                    <div class="space-y-3">
                        <input 
                            type="text" 
                            id="customApplianceName" 
                            placeholder="Appliance name (e.g., Rice Cooker)" 
                            class="w-full p-2 border rounded"
                        />
                        <input 
                            type="text" 
                            id="customApplianceDesc" 
                            placeholder="Description (optional)" 
                            class="w-full p-2 border rounded"
                        />
                        <button 
                            onclick="addCustomAppliance()" 
                            class="btn-primary px-4 py-2 rounded text-white cursor-pointer font-semibold"
                        >
                            Add Appliance
                        </button>
                    </div>
                    <p id="customApplianceError" class="error-text mt-2 hidden"></p>
                </div>

                <!-- List of Appliances -->
                <div id="appliancesListContainer" class="grid grid-cols-2 gap-4">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // APPLIANCE NAME TRANSLATIONS (Dynamic)
        const applianceTranslations = {
            en: {
                'Microwave': 'Microwave',
                'Toaster': 'Toaster',
                'Hot Plate': 'Hot Plate',
                'Air Fryer': 'Air Fryer',
                'Oven': 'Oven',
                'Blender': 'Blender',
                'Аэрогриль': 'Air Grill',
            },
            ru: {
                'Microwave': 'Микроволновка',
                'Toaster': 'Тостер',
                'Hot Plate': 'Плитка',
                'Air Fryer': 'Аэрофритюрница',
                'Oven': 'Духовка',
                'Blender': 'Блендер',
                'Аэрогриль': 'Аэрогриль',
            }
        };

        // UI TRANSLATIONS
        const translations = {
            en: {
                tabGenerate: "🍳 Generate",
                tabHistory: "📋 History",
                tabAppliances: "⚙️ Appliances",
                generate_title: "Generate Recipe",
                ingredients: "Ingredients:",
                ingredients_hint: "Separate with commas",
                appliances: "Select appliances:",
                generate_btn: "Generate Recipe",
                generating: "Generating recipe...",
                time: "Time:",
                difficulty: "Difficulty:",
                servings: "Servings:",
                steps: "Steps:",
                history_title: "Recipe History",
                no_recipes: "No recipes yet. Generate one!",
                available_appliances: "Available Appliances",
                error_generate: "Failed to generate recipe. Try again.",
                error_load_appliances: "Failed to load appliances.",
            },
            ru: {
                tabGenerate: "🍳 Генератор",
                tabHistory: "📋 История",
                tabAppliances: "⚙️ Приборы",
                generate_title: "Создать рецепт",
                ingredients: "Ингредиенты:",
                ingredients_hint: "Разделите запятыми",
                appliances: "Выберите приборы:",
                generate_btn: "Создать рецепт",
                generating: "Генерируем рецепт...",
                time: "Время:",
                difficulty: "Сложность:",
                servings: "Порций:",
                steps: "Шаги:",
                history_title: "История рецептов",
                no_recipes: "Рецептов нет. Создайте один!",
                available_appliances: "Доступные приборы",
                error_generate: "Ошибка при создании рецепта.",
                error_load_appliances: "Ошибка при загрузке приборов.",
            }
        };

        // STATE
        let state = {
            language: localStorage.getItem('language') || 'en',
            darkMode: localStorage.getItem('darkMode') === 'true',
            appliances: [],
            recipes: [],
        };
        // INIT - Multiple triggers for max compatibility
        function initApp() {
            console.log('✅ initApp called - initializing DormChef');
            try {
                applyTheme();
                updateLanguage();
                setupEventListeners();
                loadAppliances();
                loadRecipes();
                console.log('✅ DormChef initialized successfully');
            } catch(e) {
                console.error('❌ Init error:', e);
                alert('Init Error: ' + e.message);
            }
        }
        
        document.addEventListener('DOMContentLoaded', initApp);
        window.addEventListener('load', initApp);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // THEME TOGGLE
        function toggleTheme() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('darkMode', state.darkMode);
            applyTheme();
        }

        function applyTheme() {
            const btn = document.getElementById('themeBtn');
            if (state.darkMode) {
                document.body.classList.add('dark-mode');
                btn.textContent = '☀️';
            } else {
                document.body.classList.remove('dark-mode');
                btn.textContent = '🌙';
            }
        }

        // LANGUAGE TOGGLE
        function toggleLanguage() {
            state.language = state.language === 'en' ? 'ru' : 'en';
            localStorage.setItem('language', state.language);
            updateLanguage();
        }

        function translateApplianceName(originalName) {
            const dict = applianceTranslations[state.language];
            return dict && dict[originalName] ? dict[originalName] : originalName;
        }

        function updateLanguage() {
            const btn = document.getElementById('langBtn');
            btn.textContent = state.language.toUpperCase();

            // Update static UI text
            document.querySelectorAll('[data-i18n-key]').forEach(el => {
                const key = el.getAttribute('data-i18n-key');
                const text = translations[state.language][key];
                if (text) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = text;
                    } else {
                        el.textContent = text;
                    }
                }
            });

            // Re-render appliances with new language
            updateApplianceDisplay();
            
            // Re-translate all recipes in history
            displayHistory();
        }

        function updateApplianceDisplay() {
            // Checkboxes in Generator
            const container = document.getElementById('appliancesContainer');
            container.innerHTML = state.appliances.map(app => `
                <label class="flex items-center gap-2 cursor-pointer p-2 rounded" style="background-color: transparent;" onmouseover="this.style.backgroundColor='var(--border-color)'" onmouseout="this.style.backgroundColor='transparent'">
                    <input type="checkbox" class="appliance-checkbox w-4 h-4" value="${app.id}" />
                    <span>${translateApplianceName(app.name)}</span>
                </label>
            `).join('');

            // List in Appliances tab
            const listContainer = document.getElementById('appliancesListContainer');
            listContainer.innerHTML = state.appliances.map(app => `
                <div class="card border rounded p-3 shadow-sm">
                    <h3 class="font-bold">${translateApplianceName(app.name)}</h3>
                    <p class="text-sm text-muted">${app.description || ''}</p>
                </div>
            `).join('');
        }

        // APPLIANCES
        async function loadAppliances() {
            try {
                const response = await fetch('/api/appliances');
                if (!response.ok) throw new Error('Failed to load appliances');
                state.appliances = await response.json();
                updateApplianceDisplay();
            } catch (error) {
                console.error('Error loading appliances:', error);
                showError('Failed to load appliances');
            }
        }

        async function addCustomAppliance() {
            try {
                const name = document.getElementById('customApplianceName').value.trim();
                const description = document.getElementById('customApplianceDesc').value.trim();
                const errorDiv = document.getElementById('customApplianceError');

                errorDiv.classList.add('hidden');

                if (!name) {
                    errorDiv.textContent = 'Please enter appliance name';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                const response = await fetch('/api/appliances', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        description: description || null
                    })
                });

                if (!response.ok) {
                    throw new Error(`Failed to add appliance: ${response.status}`);
                }

                // Clear form
                document.getElementById('customApplianceName').value = '';
                document.getElementById('customApplianceDesc').value = '';

                // Reload appliances list
                await loadAppliances();
            } catch (error) {
                console.error('Error adding appliance:', error);
                document.getElementById('customApplianceError').textContent = `Error: ${error.message}`;
                document.getElementById('customApplianceError').classList.remove('hidden');
            }
        }

        // RECIPE GENERATION
        async function generateRecipe() {
            try {
                const ingredientsText = document.getElementById('ingredientsInput').value.trim();
                const selectedAppliances = Array.from(document.querySelectorAll('.appliance-checkbox:checked')).map(el => el.value);

                if (!ingredientsText || selectedAppliances.length === 0) {
                    showError('Please enter ingredients and select at least one appliance');
                    return;
                }

                const ingredients = ingredientsText.split(',').map(i => i.trim()).filter(i => i);
                const appliance_ids = selectedAppliances.map(Number);

                showLoading(true);
                hideError();

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ingredients, appliance_ids })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const recipe = await response.json();
                displayRecipe(recipe.content);
                loadRecipes();
                
            } catch (error) {
                console.error('generateRecipe error:', error);
                showError(`Failed to generate recipe: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function displayRecipe(recipe) {
            document.getElementById('recipeTitle').textContent = recipe.title || 'Recipe';
            document.getElementById('recipeDesc').textContent = recipe.description || '';
            document.getElementById('recipeTime').textContent = recipe.time_minutes || 0;
            document.getElementById('recipeDifficulty').textContent = recipe.difficulty || 'medium';
            document.getElementById('recipeServings').textContent = recipe.servings || 1;

            const stepsHtml = (recipe.steps || []).map((step) => `
                <div class="p-3 card border rounded border-l-4" style="border-left-color: var(--accent);">
                    <strong>Step ${step.step_number}:</strong> ${step.instruction}
                    ${step.duration_minutes ? `<span class="text-sm text-muted"> (${step.duration_minutes} min)</span>` : ''}
                </div>
            `).join('');
            document.getElementById('recipeSteps').innerHTML = stepsHtml;
            document.getElementById('recipeNotes').textContent = recipe.notes || '';

            document.getElementById('recipeResult').classList.remove('hidden');
        }

        // HISTORY
        async function loadRecipes() {
            try {
                const response = await fetch('/api/recipes');
                if (!response.ok) throw new Error('Failed to load recipes');
                state.recipes = await response.json();
                displayHistory();
            } catch (error) {
                console.error('Error loading recipes:', error);
            }
        }

        function displayHistory() {
            const container = document.getElementById('historyContainer');
            if (!state.recipes.length) {
                container.innerHTML = `<p class="text-muted">${translations[state.language].no_recipes}</p>`;
                return;
            }

            container.innerHTML = state.recipes.map((recipe) => {
                const title = recipe.content?.title || 'Recipe';
                const translatedTitle = translationService.getCacheKey(title, state.language);
                const cachedTranslation = translationService.cache.get(translatedTitle);
                
                return `
                    <div class="card border rounded p-4 shadow-sm">
                        <h3 class="font-bold text-lg">${cachedTranslation || title}</h3>
                        <p class="text-sm text-muted">
                            <strong>${translations[state.language].ingredients}:</strong> ${(recipe.ingredients || []).join(', ')}
                        </p>
                        <p class="text-sm text-muted">
                            ${recipe.content?.time_minutes || 0} min | ${recipe.content?.difficulty || 'medium'} | ${recipe.created_at ? new Date(recipe.created_at).toLocaleDateString() : ''}
                        </p>
                    </div>
                `;
            }).join('');
        }

        // UI HELPERS
        function showLoading(show) {
            const spinner = document.getElementById('loadingSpinner');
            const btn = document.getElementById('generateBtn');
            if (show) {
                spinner.classList.remove('hidden');
                btn.disabled = true;
            } else {
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        // TABS
        function setupEventListeners() {
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            document.getElementById('langBtn').addEventListener('click', toggleLanguage);
            document.getElementById('generateBtn').addEventListener('click', generateRecipe);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.getAttribute('data-tab');
                    switchTab(tabName);
                });
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });

            document.getElementById(`tab-${tabName}`).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab') === tabName);
            });
        }
    </script>
</body>
</html>
