services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dormchef-db
    environment:
      POSTGRES_USER: dormchef
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dormchef}
      POSTGRES_DB: dormchef
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dormchef"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dormchef-net

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dormchef-api
    environment:
      DATABASE_URL: postgresql+asyncpg://dormchef:${POSTGRES_PASSWORD:-dormchef}@postgres:5432/dormchef
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dormchef-net

volumes:
  postgres_data:

networks:
  dormchef-net:
    driver: bridge
